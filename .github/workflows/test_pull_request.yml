name: Test pull request
on: pull_request

jobs:
  setup-validation:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - id: uv-version
        run: echo "version=$(cat .uv-version)" >> $GITHUB_OUTPUT
      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ steps.uv-version.outputs.version }}
          python-version: '3.11'
          enable-cache: true
      - name: Verify make setup works
        run: make setup
  tox:
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        python: ['3.10', '3.11', '3.12', '3.13']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - id: uv-version
        run: echo "version=$(cat .uv-version)" >> $GITHUB_OUTPUT
      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ steps.uv-version.outputs.version }}
          python-version: ${{ matrix.python }}
          enable-cache: true
      - run: uv tool install tox --with tox-uv
      - run: tox -e py
  test-postgres:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - id: uv-version
        run: echo "version=$(cat .uv-version)" >> $GITHUB_OUTPUT
      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ steps.uv-version.outputs.version }}
          python-version: '3.11'
          enable-cache: true
      - run: make setup
      - run: make test-postgres
  lint:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - id: uv-version
        run: echo "version=$(cat .uv-version)" >> $GITHUB_OUTPUT
      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ steps.uv-version.outputs.version }}
          python-version: '3.11'
          enable-cache: true
      - run: make lint
