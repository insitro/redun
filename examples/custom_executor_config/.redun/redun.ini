# redun configuration.

[backend]
db_uri = sqlite:///redun.db

[executors.default]
type = local
max_workers = 20

# Custom executor registered via `class` key.
# No setup_scheduler function needed — redun lazily imports the class.
[executors.my_custom]
type = my_local
class = my_executors.MyLocalExecutor
log_prefix = example
